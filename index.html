<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN_LAYOUT</title>
    <link rel="stylesheet" href="./assets/index.css">
    <link rel="stylesheet" href="./assets/responsive.css">
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
    <main>
        <section class="gauche">
            <a href="#"><img src="./assets/images/3d-hygge-young-woman-working-at-the-table-wearing-vr-glasses 1.svg" alt="femmetech"></a>
        </section>
        <section class="droite">
            <form>
                <div class="barre"></div>
                <div class="titre">
                    <div class="titre1">Connexion à blue Ocean</div>
                    <div class="titre2">Connexion a Blue Ocean</div>
                </div>
                <div class="adresse">
                    <label for="email" id="lab1">Adresse Email :</label>
                    <label for="email" id="lab2">Email</label>
                    <div class="input1">
                        <img src="./assets/images/message_FILLO.svg" alt="message">
                        <input type="email" id="email" name="email" placeholder="abc@example.com">
                    </div>
                </div>
                <div class="passe">
                    <label for="passe" id="lab1">Mot de passe :</label>
                    <label for="passe" id="lab2">Mot de passe :</label>
                    <div class="input2">
                        <img src="./assets/images/lock_FILL0.svg" alt="lock">
                        <input type="password" id="passe" name="password" placeholder="******">
                    </div>
                </div>
                <div class="link">
                    <div class="link1"><a href="#">mot de passe oublié</a></div>
                    <div class="link2"><a href="#">Mot de passe oublié?</a></div>
                </div>
                <button type="submit">Connexion</button>
                <div class="option">
                    <div class="barre1"></div>
                    <div class="texte">ou avec</div>
                    <div class="barre2"></div>
                </div>
                <div class="images-links">
                    <div class="image">
                        <a href="#"><img class="dessus" src="./assets/images/chercher 1.svg" alt="google"></a>
                        <img class="bg" src="./assets/images/Ellipse 1.svg" alt="background">
                    </div>
                    <div class="image">
                        <a href="#"><img class="dessus" src="./assets/images/facebook 1.svg" alt="facebook"></a>
                        <img class="bg" src="./assets/images/Ellipse 1.svg" alt="background">
                    </div>
                    <div class="image">
                        <a href="#"><img class="dessus" src="./assets/images/github (1) 1.svg" alt="github"></a>
                        <img class="bg" src="./assets/images/Ellipse 1.svg" alt="background">
                    </div>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
